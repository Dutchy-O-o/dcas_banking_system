<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Login | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow border-0 text-center p-5" style="max-width: 500px;">
    <div class="mb-4 text-success">
        <i class="fas fa-shield-alt fa-4x"></i>
    </div>
    <h3 class="mb-3">Security Verification</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div class="alert alert-info" th:unless="${error}">
        Instruction sent to your email.
    </div>

    <form th:action="@{/verify-login-process}" method="post" id="verifyForm">
        <div class="mb-4">
            <input type="text" name="userResponse" id="codeInput"
                   class="form-control form-control-lg text-center letter-spacing-2"
                   placeholder="Enter Login Code" autocomplete="off" required>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-success w-100 py-2 fw-bold">VERIFY LOGIN</button>
    </form>

    <div class="mt-4">
        <p id="timerText" class="text-muted fw-bold">
            <i class="fas fa-clock me-1"></i> Time remaining: <span id="time" class="text-danger">03:00</span>
        </p>

        <div id="timeoutDiv" style="display: none;" th:style="${timeout} ? 'display:block' : 'display:none'">
            <div class="alert alert-warning small">Time expired.</div>
            <form th:action="@{/resend-login-code}" method="post">
                <button type="submit" class="btn btn-secondary w-100"><i class="fas fa-redo me-2"></i>Resend Code</button>
            </form>
        </div>
    </div>
</div>

<style> .letter-spacing-2 { letter-spacing: 3px; font-weight: bold; } </style>

<script>
    var timeLeft = 180;
    var timerId = setInterval(countdown, 1000);
    var timeoutDiv = document.getElementById('timeoutDiv');
    var timerText = document.getElementById('timerText');
    var codeInput = document.getElementById('codeInput');
    var submitBtn = document.getElementById('submitBtn');

    if (timeoutDiv.style.display === 'block') { clearInterval(timerId); disableForm(); }

    function countdown() {
        if (timeLeft <= 0) { clearTimeout(timerId); disableForm(); }
        else {
            var m = Math.floor(timeLeft / 60);
            var s = timeLeft % 60;
            document.getElementById('time').innerHTML = m + ":" + (s < 10 ? "0"+s : s);
            timeLeft--;
        }
    }
    function disableForm() {
        timerText.style.display = 'none';
        timeoutDiv.style.display = 'block';
        codeInput.disabled = true;
        submitBtn.disabled = true;
    }
</script>
</body>
</html>
