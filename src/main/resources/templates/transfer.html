<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transfer | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0 text-primary">Money Transfer</h4>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div class="alert alert-info d-flex align-items-center">
                        <span class="me-2">ℹ️</span>
                        <div>Current Balance: <strong>$<span th:text="${balance}"></span></strong></div>
                    </div>

                    <form th:action="@{/init-transfer}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Recipient Account Number (IBAN)</label>
                            <input type="text" name="receiverAccount" class="form-control font-monospace" placeholder="TR..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Recipient Name & Surname</label>
                            <input type="text" name="receiverName" class="form-control" placeholder="e.g. Jane Smith" required>
                            <small class="text-muted">Must match exact account holder name.</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Amount ($)</label>
                            <input type="number" name="amount" class="form-control" step="0.01" min="1" placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label>Description</label>
                            <input type="text" name="description" class="form-control" placeholder="e.g. Rent payment" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Continue</button>
                        </div>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/dashboard" class="text-decoration-none text-secondary">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
