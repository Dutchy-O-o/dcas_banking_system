<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; padding: 50px 0; }
        .card { max-width: 500px; margin: auto; border-radius: 15px; border:none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="card p-5">
    <h2 class="text-center mb-4 text-primary">Join DCAS Bank</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" method="post">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <hr>
        <h5 class="text-secondary">Security Setup</h5>
        <div class="mb-3">
            <label class="form-label">Transaction Security Word (TSW)</label>
            <input type="text" name="tsw" class="form-control" placeholder="Memorize this word (min 6 chars)" minlength="6" required>
            <small class="text-muted">Used for dynamic challenges during transfers.</small>
        </div>
        <div class="mb-3">
            <label class="form-label">Anti-Phishing Word (APW)</label>
            <input type="text" name="apw" class="form-control" placeholder="e.g. MySecretPet" required>
            <small class="text-muted">We will show this word in every email we send you.</small>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-3">Create Account</button>
    </form>
    <p class="text-center mt-3"><a href="/login">Already have an account?</a></p>
</div>
</body>
</html>
