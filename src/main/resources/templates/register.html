<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Kayıt Ol</title>
    <link rel="stylesheet" href="/css/style.css"> </head>
<body style="text-align: center; padding: 50px;">

<div class="container">
    <h2>DCAS Banka Kaydı</h2>

    <div th:if="${error}" style="color: red; background-color: #ffe6e6; padding: 10px; margin-bottom: 10px; border-radius: 5px;">
        <span th:text="${error}"></span>
    </div>

    <form th:action="@{/register}" method="post">
        <input type="text" name="username" placeholder="Kullanıcı Adı" required style="display:block; margin: 10px auto; padding: 8px;"><br>
        <input type="password" name="password" placeholder="Giriş Parolası" required style="display:block; margin: 10px auto; padding: 8px;"><br>
        <input type="text" name="tsw" placeholder="İşlem Güvenlik Kelimesi (TSW) - min 6 hane" required minlength="6" style="display:block; margin: 10px auto; padding: 8px;"><br>

        <button type="submit" class="btn btn-primary">Kayıt Ol</button>
    </form>

    <br>
    <a href="/login">Zaten hesabın var mı? Giriş Yap</a>
</div>

</body>
</html>
