<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Security Check | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow border-0 text-center p-5" style="max-width: 500px;">
    <div class="mb-4 text-primary">
        <i class="fas fa-shield-alt fa-4x"></i>
    </div>
    <h3 class="mb-3">Dynamic Security Verification</h3>
    <p class="text-muted">Please follow the instruction below to authorize this transaction.</p>

    <div class="alert alert-warning py-3">
        <h5 class="alert-heading fw-bold mb-0" style="letter-spacing: 1px;" th:text="${instruction}">INSTRUCTION</h5>
    </div>

    <form th:action="@{/verify-transfer}" method="post">
        <div class="mb-4">
            <input type="text" name="userResponse" class="form-control form-control-lg text-center letter-spacing-2"
                   placeholder="Enter Combined Code" autocomplete="off" required>
        </div>
        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">VERIFY & CONFIRM</button>
    </form>

    <p class="mt-4 text-muted small"><i class="fas fa-lock me-1"></i> DCAS Secure Technology</p>
</div>

<style> .letter-spacing-2 { letter-spacing: 3px; font-weight: bold; } </style>
</body>
</html>
