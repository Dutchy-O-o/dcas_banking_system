<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .btn-primary { background-color: #1e3c72; border: none; }
        .btn-primary:hover { background-color: #2a5298; }
    </style>
</head>
<body>
<div class="card p-4" style="width: 400px;">
    <div class="text-center mb-4">
        <i class="fas fa-university fa-3x text-primary"></i>
        <h3 class="mt-2">DCAS Bank</h3>
        <p class="text-muted">Secure Banking System</p>
    </div>
    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password</div>
    <div th:if="${param.logout}" class="alert alert-success">Logged out successfully</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
    </form>
    <div class="text-center mt-3">
        <a href="/register" class="text-decoration-none">Create an Account</a>
    </div>
</div>
</body>
</html>
