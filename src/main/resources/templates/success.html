<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow border-0 text-center p-5" style="max-width: 500px;">
    <div class="mb-4 text-success">
        <i class="fas fa-check-circle fa-5x"></i>
    </div>
    <h2 class="text-success fw-bold">Transfer Successful!</h2>
    <p class="text-muted mt-3">Your transaction has been securely verified and processed via DCAS protocol.</p>

    <div class="alert alert-light border mt-3">
        <small class="text-muted d-block">A confirmation email has been sent to you.</small>
    </div>

    <div class="d-grid gap-2 mt-4">
        <a href="/dashboard" class="btn btn-primary btn-lg">Return to Dashboard</a>
        <a href="/transfer" class="btn btn-outline-secondary">Make Another Transfer</a>
    </div>
</div>
</body>
</html>
