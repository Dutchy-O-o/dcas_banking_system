<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Account Locked | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
<div class="card shadow border-0 text-center p-5 border-top border-5 border-danger" style="max-width: 500px;">
    <div class="mb-4 text-danger">
        <i class="fas fa-lock fa-5x"></i>
    </div>
    <h2 class="text-danger fw-bold">Account Locked</h2>
    <p class="text-muted mt-3">
        For your security, your account has been temporarily locked due to multiple failed authentication attempts.
    </p>

    <div class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <div class="text-start">
            <strong>Why?</strong> Our system detected a potential brute-force attack or unauthorized access attempt.
        </div>
    </div>

    <p class="small text-muted">Please contact customer support to unlock your account.</p>

    <form th:action="@{/logout}" method="post" class="mt-4">
        <button type="submit" class="btn btn-danger w-100 btn-lg">Secure Logout</button>
    </form>
</div>
</body>
</html>
