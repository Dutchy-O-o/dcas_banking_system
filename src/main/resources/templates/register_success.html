<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center pt-5 bg-light">
<div class="container">
    <div class="card p-5 mx-auto" style="max-width: 500px;">
        <h2 class="text-success">Registration Successful!</h2>
        <p class="lead mt-3">Scan this QR code with <strong>Google Authenticator</strong></p>

        <div class="my-4">
            <img th:src="${qrUrl}" alt="QR Code" class="img-thumbnail" style="width: 200px;">
        </div>

        <div class="alert alert-warning">
            <strong>Secret Key:</strong> <span th:text="${secret}"></span>
        </div>

        <a href="/login" class="btn btn-primary w-100">Proceed to Login</a>
    </div>
</div>
</body>
</html>
