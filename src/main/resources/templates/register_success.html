<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Success | DCAS Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow border-0 mx-auto text-center p-5" style="max-width: 550px;">
        <h2 class="text-success fw-bold mb-4">Registration Successful!</h2>
        <p class="text-muted">To secure your account, please scan the QR code below using <strong>Google Authenticator</strong>.</p>

        <div class="d-flex justify-content-center my-4">
            <canvas id="qr-code"></canvas>
        </div>

        <div class="alert alert-warning text-break">
            <small class="text-muted d-block mb-1">Manual Entry Key:</small>
            <strong th:text="${secret}" style="letter-spacing: 2px;">SECRET_KEY</strong>
        </div>

        <a href="/login" class="btn btn-primary w-100 btn-lg mt-3">Proceed to Login</a>
    </div>
</div>

<script th:inline="javascript">
    (function() {
        var otpUrl = [[${otpAuthUrl}]];
        new QRious({
            element: document.getElementById('qr-code'),
            value: otpUrl,
            size: 200,
            level: 'H'
        });
    })();
</script>
</body>
</html>
